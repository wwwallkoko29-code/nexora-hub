<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexora Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Nexora Hub</h1>
  <p>Your gateway to AI tools</p>

  <input type="text" id="search" placeholder="Search AI tools...">
</header>

<nav>
  <button onclick="filter('all')">All</button>
  <button onclick="filter('coding')">Coding</button>
  <button onclick="filter('writing')">Writing</button>
  <button onclick="filter('search')">Search</button>
</nav>

<section id="tools">

  <div class="card coding">
    <h3>ChatGPT</h3>
    <p>Programming & general AI</p>
    <a href="https://chatgpt.com" target="_blank">Open</a>
  </div>

  <div class="card coding">
    <h3>Claude</h3>
    <p>Advanced coding & reasoning</p>
    <a href="https://claude.ai" target="_blank">Open</a>
  </div>

  <div class="card search">
    <h3>Perplexity</h3>
    <p>AI search engine</p>
    <a href="https://perplexity.ai" target="_blank">Open</a>
  </div>

  <div class="card writing">
    <h3>Gemini</h3>
    <p>Writing & research</p>
    <a href="https://gemini.google.com" target="_blank">Open</a>
  </div>

</section>

<script src="script.js"></script>
</body>
</html>
